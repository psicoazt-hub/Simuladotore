<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --bg-dark: #0b141a;
            --header-bg: #1f2c34;
            --bubble-in: #1f2c34;
            --bubble-out: #382061;
            --text-main: #e9edef;
            --text-meta: #8696a0;
            --wa-green: #00a884;
        }
        body, html { margin: 0; padding: 0; background: #000; font-family: sans-serif; height: 100%; overflow: hidden; }
        
        /* PANEL DE CONTROL */
        #panel { background: #121212; padding: 20px; border-bottom: 2px solid #333; position: absolute; z-index: 10; width: 100%; box-sizing: border-box; }
        input, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-gen { background: var(--wa-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; }

        /* SIMULADOR */
        #app { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            background-color: var(--bg-dark); 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-size: 450px; 
            background-repeat: repeat;
            flex-direction: column; 
            position: relative; 
        }
        
        .header { background: var(--header-bg); padding: 40px 15px 10px 10px; display: flex; align-items: center; justify-content: space-between; }
        .h-left { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; object-fit: cover; }
        .h-icons { display: flex; gap: 20px; color: var(--text-meta); font-size: 18px; }

        .chat { flex: 1; padding: 10px 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 15px; color: var(--text-main); line-height: 1.4; position: relative; }
        .in { align-self: flex-start; background: var(--bubble-in); border-top-left-radius: 0; }
        .out { align-self: flex-end; background: var(--bubble-out); border-top-right-radius: 0; }
        .meta { font-size: 10px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; display: flex; justify-content: flex-end; gap: 3px; }

        .footer { padding: 10px; display: flex; align-items: center; gap: 8px; background: transparent; }
        .input-bar { background: var(--header-bg); flex: 1; border-radius: 25px; padding: 10px 15px; display: flex; justify-content: space-between; color: var(--text-meta); font-size: 16px; }
        .mic { background: var(--wa-green); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
    </style>
</head>
<body>
    <div id="panel">
        <input type="text" id="n" placeholder="Nombre" value="Nans">
        <input type="file" id="f" accept="image/*">
        <textarea id="t" rows="5">Mensaje 1&#10;Mensaje 2&#10;Mensaje 3</textarea>
        <button class="btn-gen" onclick="render()">GENERAR CAPTURA</button>
    </div>

    <div id="app">
        <div class="header" onclick="regresar()">
            <div class="h-left">
                <span style="color:#8696a0; font-size:24px">←</span>
                <img id="av" class="avatar" src="">
                <b id="nd"></b>
            </div>
            <div class="h-icons">📹 📞 ⋮</div>
        </div>
        <div class="chat" id="c"></div>
        <div class="footer">
            <div class="input-bar"><span>😊 Mensaje</span><span>📎 📷</span></div>
            <div class="mic">🎤</div>
        </div>
    </div>

    <script>
        function render() {
            const photoInput = document.getElementById('f');
            
            // Usar FileReader para que la imagen persista
            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('av').src = e.target.result;
                    completarRender();
                }
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                completarRender();
            }
        }

        function completarRender() {
            document.getElementById('nd').innerText = document.getElementById('n').value;
            const chat = document.getElementById('c');
            chat.innerHTML = '<div style="align-self:center; background:#182229; color:#8696a0; font-size:11px; padding:5px 12px; border-radius:8px; margin:10px 0;">HOY</div>';
            
            const lines = document.getElementById('t').value.split('\n').filter(l => l.trim());
            lines.forEach((txt, i) => {
                const side = i % 2 === 0 ? 'out' : 'in';
                const checks = side === 'out' ? '<span style="color:#53bdeb">✓✓</span>' : '';
                chat.innerHTML += `<div class="bubble ${side}">${txt}<div class="meta">10:47 ${checks}</div></div>`;
            });

            document.getElementById('panel').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }

        function regresar() {
            document.getElementById('panel').style.display = 'block';
            document.getElementById('app').style.display = 'none';
        }
    </script>
</body>
</html>
