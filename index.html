<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Imperio - Classic Compact</title>
    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-header: #1f2c34;
            --wa-bubble-in: #1f2c34;
            --wa-bubble-out: #382061; /* Tu morado característico */
            --wa-text: #e9edef;
            --wa-meta: #8696a0;
            --wa-green: #00a884;
        }

        body { background: #121212; font-family: 'Segoe UI', Roboto, sans-serif; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Panel de Control */
        #controls { background: #1e1e1e; padding: 15px; border-radius: 12px; width: 100%; max-width: 360px; border: 1px solid #333; margin-bottom: 20px; box-sizing: border-box; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 14px; }
        .btn-gen { width: 100%; padding: 12px; background: var(--wa-green); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* EL SIMULADOR COMPACTO */
        #simulator-frame { display: none; border: 4px solid #333; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .phone-body { width: 340px; height: 620px; background: var(--wa-bg); background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; display: flex; flex-direction: column; position: relative; }

        /* Header con iconos reales */
        .header { background: var(--wa-header); padding: 35px 12px 10px 10px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .back-arrow { color: var(--wa-meta); font-size: 18px; margin-right: 2px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #444; object-fit: cover; }
        .contact-name { font-weight: bold; font-size: 15px; color: white; }
        .header-icons { display: flex; gap: 18px; color: var(--wa-meta); font-size: 16px; padding-right: 5px; }

        /* Chat */
        .chat-area { flex: 1; padding: 10px 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .date-label { align-self: center; background: #182229; color: var(--wa-meta); padding: 4px 10px; border-radius: 6px; font-size: 11px; margin: 10px 0; }
        
        /* Burbujas */
        .msg { max-width: 82%; padding: 7px 10px 8px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 14.5px; color: var(--wa-text); position: relative; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--wa-bubble-out); border-top-right-radius: 0; }
        .received { align-self: flex-start; background: var(--wa-bubble-in); border-top-left-radius: 0; }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; display: flex; justify-content: flex-end; gap: 3px; }

        /* BARRA INFERIOR COMPLETA */
        .footer { padding: 8px 10px 12px 10px; display: flex; align-items: center; gap: 8px; }
        .input-sim { background: var(--wa-header); flex: 1; border-radius: 22px; padding: 9px 15px; color: var(--wa-meta); display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
        .mic-btn { background: var(--wa-green); width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 18px; }
    </style>
</head>
<body>

    <div id="controls">
        <input type="text" id="nameIn" value="Nans" placeholder="Nombre">
        <label style="font-size: 11px; color: #888;">Foto Perfil:</label>
        <input type="file" id="photoIn" accept="image/*">
        <input type="time" id="timeIn" value="22:30">
        <textarea id="textIn" rows="5" placeholder="Pega los mensajes aquí..."></textarea>
        <button class="btn-gen" onclick="generar()">GENERAR SIMULADOR</button>
    </div>

    <div id="simulator-frame">
        <div class="phone-body">
            <div class="header">
                <div class="header-left">
                    <span class="back-arrow">←</span>
                    <img id="av-img" class="avatar" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
                    <span id="name-disp" class="contact-name">Nombre</span>
                </div>
                <div class="header-icons">📹 📞 ⋮</div>
            </div>
            
            <div class="chat-area" id="chat-box">
                <div class="date-label">Hoy</div>
            </div>

            <div class="footer">
                <div class="input-sim">
                    <span>😊 Mensaje</span>
                    <span style="font-size: 13px;">📎 📷</span>
                </div>
                <div class="mic-btn">🎤</div>
            </div>
        </div>
    </div>

    <script>
        function generar() {
            const lines = document.getElementById('textIn').value.split('\n').filter(l => l.trim());
            const photo = document.getElementById('photoIn').files[0];
            let [h, m] = document.getElementById('timeIn').value.split(':').map(Number);

            document.getElementById('name-disp').innerText = document.getElementById('nameIn').value;
            
            if(photo) {
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('av-img').src = e.target.result; };
                reader.readAsDataURL(photo);
            }

            const chat = document.getElementById('chat-box');
            chat.innerHTML = '<div class="date-label">Hoy</div>';

            lines.forEach((t, i) => {
                if(i > 0) m += Math.floor(Math.random() * 6) + 1;
                if(m >= 60) { m -= 60; h = (h % 12) + 1; }
                
                const timeStr = `${h}:${m.toString().padStart(2, '0')}`;
                const side = i % 2 === 0 ? 'sent' : 'received';
                const checks = side === 'sent' ? '<span style="color:#53bdeb">✓✓</span>' : '';

                chat.innerHTML += `
                    <div class="msg ${side}">
                        ${t}
                        <div class="msg-time">${timeStr} ${checks}</div>
                    </div>`;
            });

            document.getElementById('simulator-frame').style.display = 'block';
        }
    </script>
</body>
</html>
