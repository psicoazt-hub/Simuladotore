<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-dark: #0b141a;
            --header-bg: #1f2c34;
            --bubble-in: #1f2c34;
            --bubble-out: #382061;
            --text-main: #e9edef;
            --text-meta: #8696a0;
            --wa-green: #00a884;
        }
        body { margin: 0; background: #121212; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: white; display: flex; flex-direction: column; align-items: center; }
        
        /* PANEL DE ENTRADA */
        #panel { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        input, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-gen { background: var(--wa-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* CONTENEDOR DEL TELÉFONO */
        #phone-wrapper { display: none; width: 375px; height: 750px; background: #000; border: 12px solid #1f1f1f; border-radius: 40px; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: 20px 0; }
        
        #app { width: 100%; height: 100%; background-color: var(--bg-dark); background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: 400px; background-repeat: repeat; display: flex; flex-direction: column; }
        
        /* HEADER REALISTA */
        .header { background: var(--header-bg); padding: 45px 12px 10px 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .h-left { display: flex; align-items: center; gap: 8px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: #333; object-fit: cover; }
        .h-info { display: flex; flex-direction: column; }
        .h-info b { font-size: 16px; color: var(--text-main); }
        .h-icons { display: flex; gap: 18px; color: #b1b9be; font-size: 18px; padding-right: 5px; }

        /* CHAT */
        .chat { flex: 1; padding: 10px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .date-badge { align-self: center; background: #182229; color: #8696a0; font-size: 12px; padding: 5px 12px; border-radius: 8px; margin: 10px 0; text-transform: uppercase; }
        
        .bubble { max-width: 85%; padding: 6px 10px 8px 10px; border-radius: 8px; font-size: 14.5px; color: var(--text-main); line-height: 1.4; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .in { align-self: flex-start; background: var(--bubble-in); border-top-left-radius: 0; }
        .out { align-self: flex-end; background: var(--bubble-out); border-top-right-radius: 0; }
        .meta { font-size: 11px; color: rgba(233, 237, 239, 0.6); text-align: right; margin-top: 2px; display: flex; justify-content: flex-end; gap: 3px; align-items: center; }

        .input-bar { background: var(--header-bg); flex: 1; border-radius: 25px; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; color: #8696a0; }
