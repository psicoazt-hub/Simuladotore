<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador Imperio v4.0</title>
    <style>
        :root {
            --bg: #0b141a;
            --header: #1f2c34;
            --bubble-in: #1f2c34;
            --bubble-out: #005c4b;
            --text: #e9edef;
            --meta: #8696a0;
            --green: #00a884;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: #000; height: 100%; font-family: sans-serif; }

        /* Panel de Control */
        #panel { background: #121212; padding: 20px; border-bottom: 2px solid #333; display: block; }
        label { display: block; font-size: 11px; color: var(--green); margin-top: 10px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-top: 5px; }
        .btn-gen { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; margin-top: 20px; font-size: 16px; }

        /* App Pantalla Completa */
        #app { display: none; width: 100vw; height: 100vh; background: var(--bg); background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: 450px; flex-direction: column; }
        
        .header { background: var(--header); padding: 40px 15px 10px; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; object-fit: cover; }
        .info { flex: 1; color: white; }
        .name { font-weight: bold; font-size: 16px; display: block; }
        .status { font-size: 11px; color: var(--meta); }

        .chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .date { align-self: center; background: #182229; color: var(--meta); font-size: 11px; padding: 5px 12px; border-radius: 8px; margin: 10px 0; }
        
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 15px; color: var(--text); position: relative; line-height: 1.4; }
        .in { align-self: flex-start; background: var(--bubble-in); border-top-left-radius: 0; }
        .out { align-self: flex-end; background: var(--bubble-out); border-top-right-radius: 0; }
        
        .msg-meta { font-size: 10px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; display: flex; justify-content: flex-end; gap: 3px; }

        .footer { background: var(--bg); padding: 10px; display: flex; gap: 8px; align-items: center; }
        .input-box { background: var(--header); flex: 1; border-radius: 25px; padding: 10px 15px; color: var(--meta); font-size: 16px; display: flex; justify-content: space-between; }
        .mic { background: var(--green); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>

    <div id="panel">
        <label>NOMBRE CONTACTO</label>
        <input type="text" id="nameIn" value="Nans">
        <label>FOTO DE PERFIL (GALERÍA)</label>
        <input type="file" id="photoIn" accept="image/*">
        <label>HORA INICIAL</label>
        <input type="time" id="timeIn" value="22:30">
        <label>MENSAJES (UNO POR LÍNEA)</label>
        <textarea id="textIn" rows="6"></textarea>
        <button class="btn-gen" onclick="render()">GENERAR PANTALLA COMPLETA</button>
    </div>

    <div id="app">
        <div class="header">
            <span>←</span>
            <img id="avatar" class="avatar" src="">
            <div class="info">
                <span class="name" id="nameDisp"></span>
                <span class="status">en línea</span>
            </div>
            <div style="display:flex; gap:15px; color:#8696a0">📹 📞 ⋮</div>
        </div>
        <div class="chat" id="chat"></div>
        <div class="footer">
            <div class="input-box"><span>😊 Mensaje</span><span>📎 📷</span></div>
            <div class="mic">🎤</div>
        </div>
    </div>

    <script>
        function render() {
            document.getElementById('panel').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            
            const name = document.getElementById('nameIn').value;
            const lines = document.getElementById('textIn').value.split('\n').filter(l => l.trim());
            const [hBase, mBase] = document.getElementById('timeIn').value.split(':').map(Number);
            
            document.getElementById('nameDisp').innerText = name;
            const photo = document.getElementById('photoIn').files[0];
            if(photo) document.getElementById('avatar').src = URL.createObjectURL(photo);

            const chat = document.getElementById('chat');
            chat.innerHTML = '<div class="date">Hoy</div>';

            let h = hBase, m = mBase;
            lines.forEach((t, i) => {
                if(i > 0) {
                    m += Math.floor(Math.random() * 8);
                    if(m >= 60) { m -= 60; h = (h % 12) + 1; }
                }
                const side = i % 2 === 0 ? 'out' : 'in';
                const checks = side === 'out' ? '<span style="color:#53bdeb">✓✓</span>' : '';
                chat.innerHTML += `
                    <div class="msg ${side}">
                        ${t}
                        <div class="msg-meta">${h}:${m.toString().padStart(2,'0')} ${checks}</div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
