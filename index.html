<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-dark: #0b141a;
            --header-bg: #1f2c34;
            --wa-green: #00a884;
            --text-main: #e9edef;
            --text-meta: #8696a0;
        }
        body { margin: 0; background: #121212; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* PANEL DE ENTRADA (CONTROL) */
        #panel { width: 100%; max-width: 400px; padding: 20px; color: white; box-sizing: border-box; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--wa-green); font-weight: bold;}
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-gen { background: var(--wa-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }

        /* MARCO DEL TELÉFONO REALISTA */
        #phone-wrapper { display: none; width: 375px; height: 780px; background: #000; border: 12px solid #1f1f1f; border-radius: 45px; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin: 20px 0; }
        
        #app { width: 100%; height: 100%; background-color: var(--bg-dark); display: flex; flex-direction: column; }
        
        /* HEADER (CON ESTILO DE TU APP) */
        .header { background: var(--header-bg); padding: 45px 12px 12px 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .h-left { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #333; }
        .h-info b { font-size: 16px; color: var(--text-main); }
        .h-icons { display: flex; gap: 20px; color: #b1b9be; font-size: 18px; }

        /* EL CUERPO DEL CHAT ES LA CAPTURA SUBIDA */
        .chat-capture-area { flex: 1; overflow: hidden; background: #000; display: flex; align-items: flex-start; justify-content: center; }
        #chat-image { width: 100%; height: auto; }

        /* BARRA INFERIOR (FOOTER) */
        .footer { padding: 10px; display: flex; align-items: center; gap: 8px; padding-bottom: 25px; background: #0b141a; }
        .input-bar { background: var(--header-bg); flex: 1; border-radius: 25px; padding: 10px 15px; display: flex; justify-content: space-between; color: var(--text-meta); font-size: 16px; }
        .mic { background: var(--wa-green); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
    </style>
</head>
<body>

    <div id="panel">
        <h2 style="text-align:center; color:var(--wa-green)">WhatsApp Simulator (App Custom)</h2>
        <div class="input-group">
            <label>Nombre del Contacto:</label>
            <input type="text" id="n" value="Nans">
        </div>
        <div class="input-group">
            <label>Foto de Perfil (Contacto):</label>
            <input type="file" id="f_avatar" accept="image/*">
        </div>
        <div class="input-group">
            <label>Subir la Captura del Chat (con errores):</label>
            <input type="file" id="f_chat" accept="image/*">
        </div>
        <button class="btn-gen" onclick="render()">GENERAR VISTA INTEGRADA</button>
    </div>

    <div id="phone-wrapper">
        <div id="app">
            <div class="header" onclick="regresar()">
                <div class="h-left">
                    <span style="color:#00a884; font-size: 20px;">←</span>
                    <img id="av_top" class="avatar" src="">
                    <div class="h-info"><b id="nd"></b></div>
                </div>
                <div class="h-icons">📹 📞 ⋮</div>
            </div>
            
            <div class="chat-capture-area">
                <img id="chat-image" src="">
            </div>

            <div class="footer">
                <div class="input-bar"><span>😊 Mensaje</span><span>📎 📷</span></div>
                <div class="mic">🎤</div>
            </div>
        </div>
    </div>

    <script>
        function render() {
            const avatarInput = document.getElementById('f_avatar');
            const chatInput = document.getElementById('f_chat');
            const name = document.getElementById('n').value;

            // 1. Procesar Foto de Perfil
            if (avatarInput.files && avatarInput.files[0]) {
                const readerAv = new FileReader();
                readerAv.onload = (e) => document.getElementById('av_top').src = e.target.result;
                readerAv.readAsDataURL(avatarInput.files[0]);
            }

            // 2. Procesar Imagen de la Captura
            if (chatInput.files && chatInput.files[0]) {
                const readerChat = new FileReader();
                readerChat.onload = (e) => {
                    // Colocamos la captura completa como el contenido del chat
                    document.getElementById('chat-image').src = e.target.result;
                    
                    // Actualizamos nombre y mostramos el teléfono
                    document.getElementById('nd').innerText = name;
                    document.getElementById('panel').style.display = 'none';
                    document.getElementById('phone-wrapper').style.display = 'block';
                };
                readerChat.readAsDataURL(chatInput.files[0]);
            } else {
                alert("Por favor, selecciona la imagen de la captura con errores que quieres mostrar.");
            }
        }

        function regresar() {
            document.getElementById('panel').style.display = 'block';
            document.getElementById('phone-wrapper').style.display = 'none';
        }
    </script>
</body>
</html>
